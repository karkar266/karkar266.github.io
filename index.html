<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR-панель</title>

<style>

:root{
--bg:#0f0f0f;
--card:#1e1e1e;
--text:white;
}

.light{
--bg:#f4f4f4;
--card:white;
--text:#111;
}

body{
font-family:Arial,sans-serif;
background:radial-gradient(circle at top,#2c2c2c,#0a0a0a);
color:var(--text);
margin:0;
padding:25px;
text-align:center;
transition:0.3s;
}

h1{
margin-bottom:10px;
cursor:pointer;
}

button{
padding:8px 14px;
margin-bottom:25px;
border:none;
border-radius:8px;
cursor:pointer;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
max-width:800px;
margin:auto;
}

.card{
background:var(--card);
padding:15px;
border-radius:12px;
text-decoration:none;
color:var(--text);
display:flex;
align-items:center;
gap:10px;
justify-content:center;
transition:0.2s;
border:1px solid #2a2a2a;
}

.card:hover{
transform:scale(1.05);
}

.icon{
width:18px;
height:18px;
}

</style>
</head>

<body>

<h1 id="title">QR-панель</h1>

<button onclick="toggleTheme()">🌗 тема</button>

<div class="container" id="links"></div>

<script>

/* ---------- ССЫЛКИ ---------- */
/* Добавлять новые очень просто */

const sites=[

["Калькулятор дробей","https://calcus.ru/kalkulyator-drobej"],
["Википедия","https://wikipedia.org"],
["Переводчик","https://translate.google.com"],
["ГДЗ","https://gdz.ru"],
["YouTube","https://youtube.com"],
["Музыка","https://music.youtube.com"],
["Twitch","https://twitch.tv"],
["GitHub","https://github.com"],
["Pinterest","https://pinterest.com"],
["Telegram","https://web.telegram.org"],
["Discord","https://discord.com"]

]

/* ---------- генерация кнопок ---------- */

const container=document.getElementById("links")

sites.forEach(site=>{

const name=site[0]
const url=site[1]
const domain=(new URL(url)).hostname

const a=document.createElement("a")

a.href=url
a.className="card"
a.innerHTML=
`<img class="icon" src="https://www.google.com/s2/favicons?domain=${domain}">
${name}`

container.appendChild(a)

})

/* ---------- тема ---------- */

function toggleTheme(){
document.body.classList.toggle("light")
}

/* ---------- пасхалки ---------- */

let clicks=0

document.getElementById("title").onclick=function(){
clicks++

if(clicks==7){
alert("🥚 Пасхалка №1")
}
}

document.addEventListener("keydown",e=>{
if(e.key==="q"){
alert("🥚 Пасхалка №2")
}
})

let secret=0

document.body.addEventListener("dblclick",()=>{
secret++

if(secret==3){
alert("🥚 Пасхалка №3")
}
})

console.log("🥚 Пасхалка №4")

setTimeout(()=>{
if(Math.random()<0.02){
alert("🥚 Пасхалка №5")
}
},5000)

</script>

</body>
</html>
