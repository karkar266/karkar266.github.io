<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR-панель</title>

<style>
:root{
--bg:#0f0f0f;
--card:#1e1e1e;
--text:white;
}

body{
font-family:Arial,sans-serif;
background-color:var(--bg);

/* Новый красивый фон */
background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSjh2B0RxefZ5fVuzVKFW7vfGJQwgPHSJ4j5A&s');
background-size:cover;
background-position:center;
background-attachment:fixed;
color:var(--text);
margin:0;
padding:25px;
text-align:center;
transition:0.3s;
}

h1{
margin-bottom:10px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
max-width:800px;
margin:auto;
}

.card{
background:rgba(30,30,30,0.85);
padding:15px;
border-radius:12px;
text-decoration:none;
color:var(--text);
display:flex;
align-items:center;
gap:10px;
justify-content:center;
transition:0.2s;
border:1px solid #2a2c2c;
backdrop-filter:blur(5px);
}

.card:hover{
transform:scale(1.05);
}

.icon{
width:18px;
height:18px;
}
</style>
</head>

<body>

<h1>QR-панель</h1>

<div class="container" id="links"></div>

<script>
/* ---------- ССЫЛКИ ---------- */
const sites=[
["Калькулятор дробей","https://calcus.ru/kalkulyator-drobej"],
["Википедия","https://wikipedia.org"],
["Переводчик","https://translate.google.com"],
["ГДЗ","https://gdz.ru"],
["YouTube","https://youtube.com"],
["Музыка","https://music.youtube.com"],
["Twitch","https://twitch.tv"],
["GitHub","https://github.com"],
["Pinterest","https://pinterest.com"],
["Telegram","https://web.telegram.org"],
["Discord","https://discord.com"]
]

/* ---------- генерация кнопок ---------- */
const container=document.getElementById("links")
sites.forEach(site=>{
const name=site[0]
const url=site[1]
const domain=(new URL(url)).hostname
const a=document.createElement("a")
a.href=url
a.className="card"
a.innerHTML=`<img class="icon" src="https://www.google.com/s2/favicons?domain=${domain}"> ${name}`
container.appendChild(a)
})

/* ---------- СЕКРЕТНАЯ МИНИ-ИГРА ---------- */
let gameActive=false
let box

function startMiniGame(){
if(gameActive)return
gameActive=true

document.body.innerHTML=""

const title=document.createElement("h1")
title.innerText="Секретная мини-игра"
document.body.appendChild(title)

const scoreText=document.createElement("p")
scoreText.innerText="Очки: 0"
document.body.appendChild(scoreText)

box=document.createElement("div")
box.style.width="40px"
box.style.height="40px"
box.style.background="red"
box.style.position="absolute"
box.style.cursor="pointer"
document.body.appendChild(box)

let score=0

function moveBox(){
const x=Math.random()*(window.innerWidth-50)
const y=Math.random()*(window.innerHeight-50)
box.style.left=x+"px"
box.style.top=y+"px"
}

moveBox()

box.onclick=function(){
score++
scoreText.innerText="Очки: "+score
moveBox()
}

/* Выйти из игры можно обновлением страницы */
}

/* ---------- СЕКРЕТНАЯ КНОПКА ---------- */
document.addEventListener("keydown",e=>{
if(e.key==="g"){
startMiniGame()
}
})
</script>

</body>
</html>
